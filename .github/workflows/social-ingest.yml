name: Social Feed Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx==0.27.0

      - name: Run social ingest once
        env:
          BACKEND_API_URL: ${{ secrets.SOCIAL_INGEST_BACKEND_API_URL }}
          SOCIAL_FEED_URLS: ${{ vars.SOCIAL_FEED_URLS }}
          SOCIAL_INGEST_ITEMS_PER_FEED: ${{ vars.SOCIAL_INGEST_ITEMS_PER_FEED }}
          SOCIAL_INGEST_TIMEOUT_SECONDS: ${{ vars.SOCIAL_INGEST_TIMEOUT_SECONDS }}
          SOCIAL_INGEST_ONESHOT: "true"
        run: |
          export BACKEND_API_URL="${BACKEND_API_URL:-https://predai-backend.onrender.com}"
          export SOCIAL_INGEST_ITEMS_PER_FEED="${SOCIAL_INGEST_ITEMS_PER_FEED:-10}"
          export SOCIAL_INGEST_TIMEOUT_SECONDS="${SOCIAL_INGEST_TIMEOUT_SECONDS:-20}"
          python scripts/social_ingest_worker.py
