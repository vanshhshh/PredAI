apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: moltmarket-platform-alerts
spec:
  groups:
    - name: moltmarket.availability
      rules:
        - alert: FrontendHigh5xxRate
          expr: |
            sum(rate(nginx_ingress_controller_requests{service="frontend",status=~"5.."}[5m]))
            /
            sum(rate(nginx_ingress_controller_requests{service="frontend"}[5m])) > 0.02
          for: 10m
          labels:
            severity: page
          annotations:
            summary: Frontend 5xx rate above 2%
        - alert: BackendHigh5xxRate
          expr: |
            sum(rate(nginx_ingress_controller_requests{service="backend",status=~"5.."}[5m]))
            /
            sum(rate(nginx_ingress_controller_requests{service="backend"}[5m])) > 0.02
          for: 10m
          labels:
            severity: page
          annotations:
            summary: Backend 5xx rate above 2%
        - alert: AIHigh5xxRate
          expr: |
            sum(rate(nginx_ingress_controller_requests{service="ai",status=~"5.."}[5m]))
            /
            sum(rate(nginx_ingress_controller_requests{service="ai"}[5m])) > 0.05
          for: 10m
          labels:
            severity: page
          annotations:
            summary: AI service 5xx rate above 5%
    - name: moltmarket.resources
      rules:
        - alert: BackendPodsCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="default",container="backend"}[10m]) > 3
          for: 10m
          labels:
            severity: page
          annotations:
            summary: Backend pod is crash-looping
        - alert: DatabaseBackupMissing
          expr: time() - max(kube_job_status_completion_time{job_name=~"postgres-backup.*"}) > 28800
          for: 30m
          labels:
            severity: page
          annotations:
            summary: No successful DB backup for > 8 hours
